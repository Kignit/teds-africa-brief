name: Generate brief artifact

# Out-of-band brief generation. Runs the live pipeline (real connectors + network),
# writes the gated artifact public/brief.json — or a cleared { brief: null } artifact
# on failure — and commits it. The resulting push to main triggers the normal CI +
# Vercel deploy that serves it. This is SEPARATE from the Vercel build, which stays
# network/key-free.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC

# Opt JavaScript-based actions (checkout, setup-node) into the Node 24 Actions
# runtime, silencing the runner's Node-version deprecation warning. Runtime-only:
# the self-gate (verify + build) and commit logic are unchanged.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # Always operate on main, even when dispatched from another branch, so the
      # generated artifact is only ever committed to main.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      # Writes public/brief.json. Exits non-zero when no gate-passed brief was produced
      # (having still written the cleared null artifact), so the run is flagged.
      # continue-on-error lets the self-gate + commit steps still run, so the cleared null
      # artifact is committed and stale output is removed; the final step marks the run red.
      - id: generate
        run: npm run brief:generate
        continue-on-error: true
        # Keyed connectors read these from env; empty/missing secrets are fine —
        # Brent/FRED/Comtrade fail closed and simply contribute nothing.
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
      # Self-gate the EXACT workspace that will be committed — including the freshly
      # generated public/brief.json. A GITHUB_TOKEN push does NOT trigger the normal CI
      # workflow, so without this the artifact commit would reach main ungated. Running
      # the full trust gate here (verify = format + vercel-format + typecheck + lint +
      # test, then build) closes that gap. Neither step is continue-on-error: if either
      # fails the job goes red and the commit step below is skipped via if: success(), so
      # no ungated artifact is ever pushed. These steps pass independently of the brief
      # content, so a cleared { brief: null } artifact still gates cleanly.
      - name: Verify the workspace (self-gate — token pushes skip normal CI)
        run: npm run verify
      - name: Build the workspace (self-gate — token pushes skip normal CI)
        run: npm run build
      # Commit ONLY if verify + build passed. generate is continue-on-error, so a
      # generation failure still reaches this step (success() stays true) and commits the
      # cleared null artifact, clearing stale output; the final step then marks the run
      # red. A verify/build failure skips this step entirely (success() is false).
      - name: Commit artifact if changed
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/brief.json
          # Persist the rolling news-window store too (committed, outside public/). It
          # may not exist on the very first run or if generation threw before writing it.
          git add data/news-window.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No artifact change."
          else
            git commit -m "chore: regenerate brief artifact ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push origin HEAD:main
          fi
      - name: Fail the run if generation did not pass the gate
        if: steps.generate.outcome == 'failure'
        run: |
          echo "Brief generation produced no gate-passed brief; committed the cleared null artifact."
          exit 1
