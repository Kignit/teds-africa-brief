<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ted's Africa Brief — Concept Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #e9e6e0; height: 100%; }
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  /* hide scrollbars inside the device + carousels */
  .ab-scroll::-webkit-scrollbar, .ab-scroll *::-webkit-scrollbar { width: 0; height: 0; display: none; }
  @keyframes ab-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes ab-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  .ab-pulse { animation: ab-pulse 1.4s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="direction-ledger.jsx"></script>
<script type="text/babel" src="direction-pulse.jsx"></script>
<script type="text/babel" src="direction-signal.jsx"></script>

<script type="text/babel" data-presets="react">
  const Canvas = window.DesignCanvas;
  const Section = window.DCSection;
  const Artboard = window.DCArtboard;
  const Device = window.IOSDevice;

  const W = 402, H = 874;
  const frameStyle = { background: "transparent", boxShadow: "none", overflow: "visible" };

  function App() {
    return (
      <Canvas>
        <Section
          id="daily-brief"
          title="Daily Brief — three directions"
          subtitle="The same Daily Brief rendered in three visual systems. All three are live: swipe the Africa Top 5, tap “Impact map” to expand a card, and switch the market dashboard tabs. Tell me which direction to take forward and I'll build out the full multi-screen prototype (Top 5, Markets, Weekly, Deep Dive).">
          <Artboard id="ledger" label="A · The Ledger — editorial terminal" width={W} height={H} style={frameStyle}>
            <Device>
              <window.LedgerBrief />
            </Device>
          </Artboard>
          <Artboard id="pulse" label="B · Pulse — clean fintech" width={W} height={H} style={frameStyle}>
            <Device>
              <window.PulseBrief />
            </Device>
          </Artboard>
          <Artboard id="signal" label="C · Signal — dark intel terminal" width={W} height={H} style={frameStyle}>
            <Device dark>
              <window.SignalBrief />
            </Device>
          </Artboard>
        </Section>
      </Canvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
