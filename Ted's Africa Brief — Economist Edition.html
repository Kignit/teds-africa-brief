<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback, useContext, Fragment } = React;
const D = window.TAB;

/* ───────── primitives ───────── */
function Sparkline({ data, color = "#1E6F4C", width = 64, height = 22, strokeWidth = 1.6, fill = null, dot = false }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const span = max - min || 1;
  const stepX = width / (data.length - 1);
  const pts = data.map((v, i) => {
    const x = i * stepX;
    const y = height - ((v - min) / span) * (height - strokeWidth * 2) - strokeWidth;
    return [x, y];
  });
  const d = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const areaD = fill ? d + ` L ${width} ${height} L 0 ${height} Z` : null;
  const last = pts[pts.length - 1];
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: "block", overflow: "visible" }}>
      {fill && <path d={areaD} fill={fill} />}
      <path d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" />

function TrendArrow({ tone, size = 10, c }) {

  if (tone === "neutral") {
    return <svg width={size} height={size} viewBox="0 0 10 10"><path d="M2 5h6" stroke={col} strokeWidth="1.6" strokeLinecap="round" /></svg>;
  }
  const up = tone === "pos";
  return (
    <svg width={size} height={size} viewBox="0 0 10 10">
      {up ? <path d="M5 2l3 4H6v2H4V6H2z" fill={col} /> : <path d="M5 8l3-4H6V2H4v2H2z" fill={col} />}
    </svg>

}

function Top5() {
  const [idx, setIdx] = useState(0);
  const ref = useRef(null);
  const n = D.top5.length;
  const onScroll = () => { const el = ref.current; if (!el) return; setIdx(Math.round(el.scrollLeft / (el.scrollWidth / n))); };
  const goTo = (i) => { const el = ref.current; if (!el) return; const t = Math.max(0, Math.min(n - 1, i)); el.scrollTo({ left: t * (el.scrollWidth / n), behavior: "smooth" }); setIdx(t); };
  const Arrow = ({ dir, off }) => (
    <button onClick={() => goTo(idx + dir)} disabled={off} style={{ all: "unset", cursor: off ? "default" : "pointer", width: 36, height: 36, borderRadius: 999, background: "var(--card)", boxShadow: SHADOW, display: "flex", alignItems: "center", justifyContent: "center", opacity: off ? 0.4 : 1 }}>
      <svg width="13" height="13" viewBox="0 0 13 13" style={{ transform: dir < 0 ? "rotate(180deg)" : "none" }}><path d="M4 2l5 4.5-5 4.5" stroke="var(--ink)" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
    </button>
  );
  return (
    <>
      <SectionHead kicker="The week in five" action={`${idx + 1} / ${n}`} />
      <div ref={ref} onScroll={onScroll} className="ab-scroll" style={{ display: "flex", overflowX: "auto", scrollSnapType: "x mandatory", padding: "12px 18px 0", scrollbarWidth: "none" }}>
        {D.top5.map((it) => <Top5Card key={it.rank} item={it} />)}
      </div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 14, marginTop: 14 }}>
        <Arrow dir={-1} off={idx <= 0} />
        <div style={{ display: "flex", gap: 6 }}>
          {D.top5.map((_, i) => <span key={i} onClick={() => goTo(i)} style={{ cursor: "pointer", width: i === idx ? 20 : 6, height: 6, borderRadius: 6, background: i === idx ? "var(--accent)" : "var(--hair)", transition: "all .25s" }} />)}
        </div>
        <Arrow dir={1} off={idx >= n - 1} />
      </div>
    </>
  );
}

      <h3 style={{ fontFamily: serif, fontSize: 18, fontWeight: 600, color: "var(--ink)", letterSpacing: -0.2, margin: "0 0 12px" }}>{b.title}</h3>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {b.items.map((it, i) => (
          <div key={i} style={{ display: "flex", gap: 10 }}>
            <span style={{ width: 8, height: 8, borderRadius: 8, background: c(it.tone), flexShrink: 0, marginTop: 5 }} />
            <span style={{ fontSize: 13.5, lineHeight: 1.5, color: "var(--ink)", opacity: 0.86 }}>{it.text}</span>
          </div>
        ))}
      </div>
    </Card>
  );
}

const BLOCK = { prose: WeekProse, top10: WeekTop10, pulse: WeekPulse, dealwire: WeekDealwire, watchlist: WeekWatchlist, calendar: WeekCalendar, deals: WeekDeals, focal: WeekFocal, risks: WeekRisks };

function WeeklyScreen() {
  const [ed, setEd] = useState("sat");
  const e = D.weekly[ed];
  return (
    <>
      <ScreenHead sub="Weekly intelligence" title="Weekly" />
      <div style={{ padding: "10px 18px 4px", display: "flex", gap: 8 }}>
        {[["sat", "Sat · Review"], ["sun", "Sun · Ahead"]].map(([k, l]) => (
          <button key={k} onClick={() => setEd(k)} style={{ all: "unset", cursor: "pointer", flex: 1, textAlign: "center", fontSize: 12.5, fontWeight: 700, padding: "10px 0", borderRadius: 12, color: ed === k ? "#fff" : "var(--muted)", background: ed === k ? "var(--accent)" : "var(--card)", boxShadow: ed === k ? "0 4px 12px rgba(61,78,232,.3)" : SHADOW }}>{l}</button>
        ))}
      </div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 20px 8px" }}>
        <div>
          <div style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: "var(--ink)", letterSpacing: -0.2 }}>{e.label}</div>
          <div style={{ fontSize: 12, color: "var(--muted)" }}>{e.day} · {e.range}</div>
        </div>
        <SaveButton id="weekly_sat" />
      </div>
      <div style={{ padding: "0 18px" }}>
        {e.blocks.map((b, i) => { const C = BLOCK[b.type]; return C ? <C key={i} b={b} /> : null; })}
      </div>
      <div style={{ padding: "8px 24px 30px", textAlign: "center" }}>
        <div style={{ fontSize: 11.5, color: "var(--muted)" }}>— Ted's Africa Brief | Facts. Context. Balance.</div>
      </div>
    </>
  );
}

/* ───────── SAVED ───────── */
function SavedScreen({ go }) {
  const ctx = useContext(SaveCtx);
  const [filter, setFilter] = useState("All");
  const items = ctx.ids.map((id) => ({ id, ...D.savable[id] })).filter((x) => x.title);
  const kinds = ["All", "Analysis", "Top 5", "Weekly"];
  const shown = filter === "All" ? items : items.filter((x) => x.kind === filter);
  return (
    <>
      <ScreenHead sub={`${items.length} saved`} title="Saved" />
      <div className="ab-scroll" style={{ display: "flex", gap: 8, overflowX: "auto", padding: "10px 18px 6px", scrollbarWidth: "none" }}>
        {kinds.map((k) => (
          <button key={k} onClick={() => setFilter(k)} style={{ all: "unset", cursor: "pointer", flexShrink: 0, fontSize: 12, fontWeight: 700, padding: "7px 14px", borderRadius: 999, color: filter === k ? "#fff" : "var(--muted)", background: filter === k ? "var(--ink)" : "var(--card)", boxShadow: filter === k ? "none" : SHADOW }}>{k}</button>
        ))}
      </div>
      {shown.length === 0 ? (
        <div style={{ padding: "70px 40px", textAlign: "center" }}>
          <div style={{ width: 56, height: 56, borderRadius: 18, background: "var(--card)", boxShadow: SHADOW, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
            <svg width="22" height="24" viewBox="0 0 15 17" fill="none"><path d="M2 2.2A1.2 1.2 0 013.2 1h8.6A1.2 1.2 0 0113 2.2V16l-5.5-3.4L2 16V2.2z" stroke="var(--muted)" strokeWidth="1.5" strokeLinejoin="round" /></svg>
          </div>
          <div style={{ fontSize: 15, fontWeight: 700, color: "var(--ink)" }}>Nothing saved yet</div>
          <p style={{ fontSize: 13, color: "var(--muted)", lineHeight: 1.5, margin: "6px 0 16px" }}>Tap the bookmark on any leader, briefing or country card to keep it here for later.</p>
          <button onClick={() => go("daily")} style={{ all: "unset", cursor: "pointer", background: "var(--accent)", color: "#fff", fontSize: 13, fontWeight: 700, padding: "10px 20px", borderRadius: 999 }}>Go to Daily</button>
        </div>
      ) : (
        <div style={{ padding: "8px 18px 30px", display: "flex", flexDirection: "column", gap: 11 }}>
          {shown.map((x) => (
            <Card key={x.id} style={{ padding: 15, display: "flex", alignItems: "flex-start", gap: 12 }}>
              <span style={{ width: 8, height: 8, borderRadius: 8, background: c(x.tone), flexShrink: 0, marginTop: 6 }} />
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase", color: "var(--accent)" }}>{x.kind}</div>
                <div style={{ fontSize: 14.5, fontWeight: 700, color: "var(--ink)", lineHeight: 1.25, margin: "3px 0 4px" }}>{x.title}</div>
                <div style={{ fontSize: 11.5, color: "var(--muted)" }}>{x.meta}</div>
              </div>
              <SaveButton id={x.id} size={32} />
            </Card>
          ))}
        </div>
      )}
    </>
  );
}

/* ───────── coverage row (Daily) ───────── */
function CoverageRow() {
  const ui = useContext(UICtx);
  const covCountries = ui.coverage.map((cc) => D.countries.find((c) => c.cc === cc)).filter(Boolean);
  const focusLabels = ui.focus.map((f) => (D.focusAreas.find((x) => x.id === f) || {}).label).filter(Boolean);
  return (
    <div style={{ padding: "10px 18px 0" }}>
      <Card style={{ padding: "12px 14px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: 0.6, textTransform: "uppercase", color: "var(--muted)" }}>Your coverage</span>
          <button onClick={ui.editCoverage} style={{ all: "unset", cursor: "pointer", fontSize: 12, fontWeight: 700, color: "var(--accent)" }}>Edit</button>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 7, marginTop: 9, flexWrap: "wrap" }}>
          {covCountries.map((c) => (
            <span key={c.cc} style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 700, color: "var(--ink)", background: "var(--chipBg)", padding: "5px 9px", borderRadius: 999 }}><span style={{ fontSize: 14 }}>{c.flag}</span>{c.cc}</span>
          ))}
          <button onClick={ui.openDirectory} style={{ all: "unset", cursor: "pointer", fontSize: 12, fontWeight: 700, color: "var(--accent)", background: "rgba(61,78,232,.10)", padding: "5px 11px", borderRadius: 999 }}>All Africa →</button>
        </div>
        <div style={{ fontSize: 11.5, color: "var(--muted)", marginTop: 10, lineHeight: 1.45 }}>Focus · {focusLabels.join(" · ")}</div>
      </Card>
    </div>
  );
}

/* ───────── bottom sheet + sources + directory ───────── */
function Sheet({ title, sub, onClose, children }) {
  return (
    <div onClick={onClose} style={{ position: "absolute", inset: 0, zIndex: 80, background: "rgba(16,23,34,.40)", display: "flex", alignItems: "flex-end" }}>
      <div onClick={(e) => e.stopPropagation()} className="ab-scroll" style={{ width: "100%", maxHeight: "86%", overflowY: "auto", background: "var(--bg)", borderTopLeftRadius: 26, borderTopRightRadius: 26, boxShadow: "0 -20px 60px rgba(0,0,0,.25)" }}>
        <div style={{ position: "sticky", top: 0, background: "var(--bg)", padding: "14px 20px 12px", zIndex: 1 }}>
          <div style={{ width: 40, height: 5, borderRadius: 5, background: "var(--hair)", margin: "0 auto 14px" }} />
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12 }}>
            <div>
              <h2 style={{ fontFamily: serif, fontSize: 22, fontWeight: 600, color: "var(--ink)", margin: 0, letterSpacing: -0.3 }}>{title}</h2>
              {sub && <div style={{ fontSize: 12.5, color: "var(--muted)", marginTop: 4, lineHeight: 1.45 }}>{sub}</div>}
            </div>
            <button onClick={onClose} style={{ all: "unset", cursor: "pointer", width: 30, height: 30, borderRadius: 999, background: "var(--card)", boxShadow: SHADOW, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2l-8 8" stroke="var(--ink)" strokeWidth="1.6" strokeLinecap="round" /></svg>
            </button>
          </div>
        </div>
        <div style={{ padding: "4px 18px 28px" }}>{children}</div>
      </div>
    </div>
  );
}

function SourcesSheet({ onClose }) {
  return (
    <Sheet title="Sources" sub={`Every brief is drafted by AI and cross-checked across ${D.provenance.sources} sources.`} onClose={onClose}>
      <div style={{ display: "flex", flexDirection: "column", gap: 11 }}>
        {D.sources.map((s, i) => (
          <Card key={i} style={{ padding: 15 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
              <span style={{ fontSize: 13.5, fontWeight: 700, color: "var(--ink)" }}>{s.tier}</span>
              <span style={{ fontFamily: mono, fontSize: 10, fontWeight: 600, color: "var(--accent)", background: "rgba(61,78,232,.10)", padding: "3px 8px", borderRadius: 999, whiteSpace: "nowrap" }}>{s.trust}</span>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
              {s.items.map((it, j) => (
                <span key={j} style={{ fontSize: 11.5, fontWeight: 600, color: "var(--ink)", background: "var(--chipBg)", border: "1px solid var(--hair)", padding: "5px 9px", borderRadius: 8 }}>{it}</span>
              ))}
            </div>
          </Card>
        ))}
        <div style={{ display: "flex", gap: 9, alignItems: "flex-start", padding: "6px 4px 0" }}>
          <svg width="14" height="15" viewBox="0 0 12 13" style={{ flexShrink: 0, marginTop: 2 }}><path d="M6 1l4.5 1.8v3.4c0 2.7-1.9 5-4.5 5.8C3.4 11.2 1.5 8.9 1.5 6.2V2.8L6 1z" fill="none" stroke="var(--muted)" strokeWidth="1.1" /><path d="M4 6.4l1.4 1.4L8.3 5" stroke="var(--muted)" strokeWidth="1.2" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
          <span style={{ fontSize: 12, lineHeight: 1.5, color: "var(--muted)" }}>Claims are verified against at least two independent sources before they appear. Primary data — central banks, finance ministries, multilaterals — outranks secondary reporting.</span>
        </div>
      </div>
    </Sheet>
  );
}

function CountryDirectory({ coverage, onToggle, onClose }) {
  const ui = useContext(UICtx);
  const [q, setQ] = useState("");
  const list = D.countries.filter((c) => c.name.toLowerCase().includes(q.toLowerCase()));
  return (
    <Sheet title="Countries" sub="These five launch markets are live today. Add or remove any from your standing brief, or open one to read on its own." onClose={onClose}>
      <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search countries" style={{ width: "100%", boxSizing: "border-box", border: "1px solid var(--hair)", background: "var(--card)", borderRadius: 12, padding: "11px 14px", fontSize: 14, color: "var(--ink)", fontFamily: "inherit", marginBottom: 12, outline: "none" }} />
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {list.map((c) => {
          const on = coverage.includes(c.cc);
          return (
            <Card key={c.cc} style={{ padding: "11px 14px", display: "flex", alignItems: "center", gap: 11 }}>
              <span style={{ fontSize: 22 }}>{c.flag}</span>
              <span style={{ fontSize: 14, fontWeight: 700, color: "var(--ink)", flex: 1 }}>{c.name}</span>
              <button style={{ all: "unset", cursor: "pointer", fontSize: 12, fontWeight: 700, color: "var(--muted)", marginRight: 4 }}>Read →</button>
              <button onClick={() => onToggle(c.cc)} style={{ all: "unset", cursor: "pointer", fontSize: 11.5, fontWeight: 700, color: on ? "#fff" : "var(--accent)", background: on ? "var(--accent)" : "rgba(61,78,232,.10)", padding: "6px 11px", borderRadius: 999 }}>{on ? "In brief ✓" : "+ Add"}</button>
            </Card>
          );
        })}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 9, marginTop: 14, padding: "12px 14px", borderRadius: 14, border: "1px dashed var(--hair)", color: "var(--muted)" }}>
        <span style={{ fontSize: 18 }}>🌍</span>
        <span style={{ fontSize: 12, lineHeight: 1.45 }}>More countries are being added over time. Tell us which you'd like to see next.</span>
      </div>
      <button onClick={() => { onClose(); ui.editCoverage(); }} style={{ all: "unset", cursor: "pointer", display: "block", textAlign: "center", marginTop: 12, padding: "12px 0", borderRadius: 12, fontSize: 13, fontWeight: 700, color: "var(--accent)", background: "rgba(61,78,232,.10)" }}>Re-run setup</button>
    </Sheet>
  );
}

/* ───────── onboarding ───────── */
function OnbChip({ on, onClick, children }) {
  return (
    <button onClick={onClick} style={{ all: "unset", cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 7, fontSize: 13, fontWeight: 600, color: on ? "#fff" : "var(--ink)", background: on ? "var(--accent)" : "var(--card)", border: on ? "1px solid var(--accent)" : "1px solid var(--hair)", boxShadow: on ? "none" : SHADOW, padding: "10px 14px", borderRadius: 14 }}>{children}</button>
  );
}

function Onboarding({ onDone, initialCov, initialFoc }) {
  const [step, setStep] = useState(0);
  const [cov, setCov] = useState((initialCov || D.defaultCoverage).slice());
  const [foc, setFoc] = useState((initialFoc || D.defaultFocus).slice());
  const tog = (arr, set, v) => set(arr.includes(v) ? arr.filter((x) => x !== v) : [...arr, v]);
  const titles = ["Choose your countries", "Choose your focus"];
  const subs = [
    "Your brief always covers these five launch markets, so you get the full picture. You can read any one on its own — and we add more countries over time.",
    "We run every story through the lenses you pick, and spell out what it means for your countries. Sources are aggregated and verified for you.",
  ];
  const canNext = step === 0 ? cov.length > 0 : foc.length > 0;
  const next = () => (step < 1 ? setStep(step + 1) : onDone(cov, foc));
  return (
    <div style={{ ...VARS, height: "100%", display: "flex", flexDirection: "column", background: "var(--bg)", color: "var(--ink)" }}>
      <div style={{ padding: "60px 22px 6px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: 11, background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 12px rgba(61,78,232,.35)" }}><span style={{ color: "#fff", fontWeight: 800, fontSize: 14, letterSpacing: -1 }}>tab</span></div>
          <span style={{ fontSize: 14, fontWeight: 700, color: "var(--ink)" }}>Ted's Africa Brief</span>
          {step < 1 && <button onClick={() => onDone(cov, foc)} style={{ all: "unset", cursor: "pointer", marginLeft: "auto", fontSize: 12.5, fontWeight: 600, color: "var(--muted)" }}>Skip</button>}
        </div>
        <div style={{ display: "flex", gap: 6, marginTop: 18 }}>
          {[0, 1].map((i) => <span key={i} style={{ flex: 1, height: 4, borderRadius: 4, background: i <= step ? "var(--accent)" : "var(--hair)", transition: "all .25s" }} />)}
        </div>
        <h1 style={{ fontFamily: serif, fontSize: 26, fontWeight: 600, letterSpacing: -0.4, margin: "18px 0 6px", lineHeight: 1.15 }}>{titles[step]}</h1>
        <p style={{ fontSize: 13, lineHeight: 1.5, color: "var(--muted)", margin: 0 }}>{subs[step]}</p>
      </div>
      <div className="ab-scroll" style={{ flex: 1, overflowY: "auto", padding: "16px 18px 10px" }}>
        {step === 0 && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 9 }}>
            {D.countries.map((c) => (
              <OnbChip key={c.cc} on={cov.includes(c.cc)} onClick={() => tog(cov, setCov, c.cc)}>
                <span style={{ fontSize: 16 }}>{c.flag}</span>{c.name}
              </OnbChip>
            ))}
          </div>
        )}
        {step === 1 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {D.focusAreas.map((f) => {
              const on = foc.includes(f.id);
              return (
                <button key={f.id} onClick={() => tog(foc, setFoc, f.id)} style={{ all: "unset", cursor: "pointer", display: "flex", alignItems: "center", gap: 12, padding: "13px 15px", borderRadius: 16, background: "var(--card)", border: on ? "1.5px solid var(--accent)" : "1.5px solid transparent", boxShadow: SHADOW }}>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div style={{ fontSize: 14.5, fontWeight: 700, color: "var(--ink)" }}>{f.label}</div>
                    <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 1 }}>{f.desc}</div>
                  </div>
                  <span style={{ width: 24, height: 24, borderRadius: 999, border: on ? "none" : "1.5px solid var(--hair)", background: on ? "var(--accent)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    {on && <svg width="13" height="13" viewBox="0 0 13 13"><path d="M3 6.8l2.4 2.4L10 4" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>}
                  </span>
                </button>
              );
            })}
          </div>
        )}
      </div>
      <div style={{ padding: "10px 18px 26px", display: "flex", gap: 10, background: "var(--bg)", borderTop: "1px solid var(--hair)" }}>
        {step > 0 && <button onClick={() => setStep(step - 1)} style={{ all: "unset", cursor: "pointer", padding: "13px 18px", borderRadius: 14, fontSize: 13.5, fontWeight: 700, color: "var(--ink)", background: "var(--card)", boxShadow: SHADOW }}>Back</button>}
        <button onClick={next} disabled={!canNext} style={{ all: "unset", cursor: canNext ? "pointer" : "default", flex: 1, textAlign: "center", padding: "13px 0", borderRadius: 14, fontSize: 13.5, fontWeight: 700, color: "#fff", background: canNext ? "var(--accent)" : "var(--muted)", boxShadow: canNext ? "0 6px 16px rgba(61,78,232,.3)" : "none", opacity: canNext ? 1 : 0.6 }}>
          {step === 0 ? `Continue · ${cov.length} countries` : "Build my brief"}
        </button>
      </div>
    </div>
  );
}

/* ───────── TAB BAR + APP ───────── */
const ICONS = {
  daily: "M3 9.6L11 3l8 6.6V19a1 1 0 01-1 1h-4.2v-5.6H8.2V20H4a1 1 0 01-1-1z",
  markets: "M3 18V9.5M8.3 18V4M13.6 18v-6.5M19 18V7",
  weekly: "M4 6.2A1.2 1.2 0 015.2 5h11.6A1.2 1.2 0 0118 6.2V18a1 1 0 01-1 1H5a1 1 0 01-1-1zM4 9.4h14M8 4v3.2M14 4v3.2",
  saved: "M6 3.3A1 1 0 017 2.4h8a1 1 0 011 .9V19l-5-3.1L6 19z",
};

function TabBar({ active, go }) {
  return (
    <nav style={{ display: "flex", justifyContent: "space-around", alignItems: "center", padding: "10px 8px 24px", background: "var(--card)", borderTop: "1px solid var(--hair)", flexShrink: 0, position: "relative", zIndex: 5 }}>
      {D.nav.map((n) => {
        const on = active === n.id;
        const fill = n.id === "saved" && on;
        return (
          <button key={n.id} onClick={() => go(n.id)} style={{ all: "unset", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, color: on ? "var(--accent)" : "var(--muted)", padding: "2px 14px" }}>
            <svg width="23" height="23" viewBox="0 0 22 22" fill={fill ? "var(--accent)" : "none"}>
              <path d={ICONS[n.id]} stroke="currentColor" strokeWidth={on ? 2 : 1.7} strokeLinejoin="round" strokeLinecap="round" />
            </svg>
            <span style={{ fontSize: 9.5, fontWeight: on ? 700 : 500 }}>{n.label}</span>
          </button>
        );
      })}
    </nav>
  );
}

function PulseApp() {
  const [onboarded, setOnboarded] = useState(false);
  const [coverage, setCoverage] = useState(D.defaultCoverage.slice());
  const [focus, setFocus] = useState(D.defaultFocus.slice());
  const [active, setActive] = useState("daily");
  const [ids, setIds] = useState(D.savedSeed.slice());
  const [overlay, setOverlay] = useState(null); // "sources" | "directory" | null

  const go = useCallback((t) => setActive(t), []);
  const toggle = useCallback((id) => setIds((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [id, ...prev]), []);
  const has = useCallback((id) => ids.includes(id), [ids]);
  const togCoverage = useCallback((cc) => setCoverage((prev) => prev.includes(cc) ? prev.filter((x) => x !== cc) : [...prev, cc]), []);

  if (!onboarded) {
    return <Onboarding initialCov={coverage} initialFoc={focus} onDone={(cov, foc) => { setCoverage(cov); setFocus(foc); setActive("daily"); setOnboarded(true); }} />;
  }

  const ui = {
    coverage, focus,
    openSources: () => setOverlay("sources"),
    openDirectory: () => setOverlay("directory"),
    editCoverage: () => setOverlay(null) || setOnboarded(false),
  };

  const screens = [
    ["daily", <DailyScreen go={go} />],
    ["markets", <MarketsScreen go={go} />],
    ["weekly", <WeeklyScreen go={go} />],
    ["saved", <SavedScreen go={go} />],
  ];

  return (
    <UICtx.Provider value={ui}>
      <SaveCtx.Provider value={{ ids, toggle, has }}>
        <div style={{ ...VARS, height: "100%", display: "flex", flexDirection: "column", background: "var(--bg)", color: "var(--ink)" }}>
          <div style={{ flex: 1, position: "relative", minHeight: 0 }}>
            {screens.map(([id, node]) => (
              <div key={id} className="ab-scroll" style={{ position: "absolute", inset: 0, overflowY: "auto", WebkitOverflowScrolling: "touch", display: active === id ? "block" : "none" }}>
                {node}
              </div>
            ))}
          </div>
          <TabBar active={active} go={go} />
          {overlay === "sources" && <SourcesSheet onClose={() => setOverlay(null)} />}
          {overlay === "directory" && <CountryDirectory coverage={coverage} onToggle={togCoverage} onClose={() => setOverlay(null)} />}
        </div>
      </SaveCtx.Provider>
    </UICtx.Provider>
  );
}

function Root() {
  return (
    <IOSDevice>
      <PulseApp />
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
